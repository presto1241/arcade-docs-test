name: Trigger Docs Build

on:
  push:
    branches: [ master ]

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger docs repo
        run: |
          curl -f -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.DOCS_TOKEN }}" \
            https://api.github.com/repos/presto1241/arcade-docs/dispatches \
            -d '{"event_type":"build-docs"}'
